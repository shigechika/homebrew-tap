name: Sync README Descriptions

on:
  schedule:
    # Weekly on Monday 03:17 UTC (prime fields to avoid congested slots)
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch descriptions and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import subprocess, re

          PACKAGES = [
              {
                  "name": "junos-ops",
                  "pkg_url": "https://pypi.org/project/junos-ops/",
                  "repo": "shigechika/junos-ops",
                  "github_url": "https://github.com/shigechika/junos-ops",
              },
              {
                  "name": "mcp-stdio",
                  "pkg_url": "https://pypi.org/project/mcp-stdio/",
                  "repo": "shigechika/mcp-stdio",
                  "github_url": "https://github.com/shigechika/mcp-stdio",
              },
              {
                  "name": "speedtest-z",
                  "pkg_url": "https://pypi.org/project/speedtest-z/",
                  "repo": "shigechika/speedtest-z",
                  "github_url": "https://github.com/shigechika/speedtest-z",
              },
              {
                  "name": "gws-mcp",
                  "pkg_url": "https://github.com/shigechika/gws-mcp",
                  "repo": "shigechika/gws-mcp",
                  "github_url": "https://github.com/shigechika/gws-mcp",
              },
          ]

          def get_description(repo):
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}", "-q", ".description"],
                  capture_output=True, text=True, check=True,
              )
              return result.stdout.strip()

          START = "<!-- PACKAGES-TABLE-START -->"
          END = "<!-- PACKAGES-TABLE-END -->"
          pattern = re.compile(rf"{re.escape(START)}\n.*?{re.escape(END)}", re.DOTALL)

          descs = {pkg["repo"]: get_description(pkg["repo"]) for pkg in PACKAGES}

          en_rows = "\n".join(
              f'| [{p["name"]}]({p["pkg_url"]}) | {descs[p["repo"]]} | [GitHub]({p["github_url"]}) |'
              for p in PACKAGES
          )
          en_table = (
              "| Package | Description | Source |\n"
              "|---------|-------------|--------|\n"
              + en_rows
          )

          ja_rows = "\n".join(
              f'| [{p["name"]}]({p["pkg_url"]}) | {descs[p["repo"]]} | [GitHub]({p["github_url"]}) |'
              for p in PACKAGES
          )
          ja_table = (
              "| パッケージ | 説明 | ソース |\n"
              "|-----------|------|--------|\n"
              + ja_rows
          )

          for path, table in [("README.md", en_table), ("README.ja.md", ja_table)]:
              with open(path) as f:
                  content = f.read()
              new_content = pattern.sub(f"{START}\n{table}\n{END}", content)
              if new_content != content:
                  with open(path, "w") as f:
                      f.write(new_content)
                  print(f"Updated {path}")
              else:
                  print(f"No changes in {path}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.ja.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync package descriptions from GitHub"
            # Push with rebase-retry — see update-formula.yml. This job
            # only touches README files, so a rebase onto a concurrent
            # formula push applies cleanly.
            n=0
            until git push; do
              n=$((n + 1))
              if [ "$n" -ge 5 ]; then
                echo "::error::push failed after $n attempts"
                exit 1
              fi
              echo "::warning::push rejected (attempt $n) — rebasing onto origin/main"
              git pull --rebase origin main
              sleep $((n * 3))
            done
          fi
