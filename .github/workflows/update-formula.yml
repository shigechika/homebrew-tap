name: Update Formula

on:
  repository_dispatch:
    types: [update_junos_ops, update_speedtest_z, update_mcp_stdio]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to update"
        required: true
        type: choice
        options:
          - junos-ops
          - mcp-stdio
          - speedtest-z

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Determine package
        id: pkg
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              update_junos_ops)   echo "name=junos-ops" >> "$GITHUB_OUTPUT" ;;
              update_mcp_stdio)  echo "name=mcp-stdio" >> "$GITHUB_OUTPUT" ;;
              update_speedtest_z) echo "name=speedtest-z" >> "$GITHUB_OUTPUT" ;;
            esac
            # client_payload.version から v prefix を除去（例: v0.5.1 → 0.5.1）
            RAW_VERSION="${{ github.event.client_payload.version }}"
            echo "version=${RAW_VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        # PyPI's JSON index reflects a new release immediately, but the
        # files.pythonhosted.org CDN that ``pip install`` downloads from
        # can lag by up to several minutes after publish. When this job
        # is kicked off by the upstream release workflow's
        # repository_dispatch (fired within seconds of the PyPI upload),
        # we routinely hit that window and ``pip install PKG==VERSION``
        # fails with "No matching distribution found". Retry with a
        # short backoff to absorb the propagation delay.
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          if [ -n "$VERSION" ]; then
            SPEC="${PKG}==${VERSION}"
          else
            SPEC="${PKG}"
          fi

          max_attempts=10
          delay=30
          attempt=1
          while true; do
            if pip install "setuptools<71" "$SPEC" homebrew-pypi-poet; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::pip install $SPEC failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::pip install $SPEC failed on attempt $attempt/$max_attempts — retrying in ${delay}s (PyPI CDN propagation)"
            attempt=$((attempt + 1))
            sleep "$delay"
          done

      - name: Generate formula
        run: |
          poet -f "${{ steps.pkg.outputs.name }}" > /tmp/formula-raw.rb

      - name: Patch formula metadata
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
        run: |
          python3 << 'PYEOF'
          import os, re

          pkg = os.environ["PACKAGE_NAME"]

          PACKAGE_META = {
              "junos-ops": {
                  "formula": "junos-ops",
                  "desc": "Automated JUNOS package update tool for Juniper devices",
                  "homepage": "https://github.com/shigechika/junos-ops",
                  "license": "Apache-2.0",
                  "test_cmd": "junos-ops",
                  "extra_deps": [
                      'depends_on "rust" => :build',
                      'depends_on "libffi"',
                      'depends_on "libsodium"',
                      'depends_on "openssl@3"',
                  ],
                  "uses_from_macos": [
                      'uses_from_macos "libxml2"',
                      'uses_from_macos "libxslt"',
                  ],
              },
              "mcp-stdio": {
                  "formula": "mcp-stdio",
                  "desc": "Stdio-to-HTTP relay for MCP servers",
                  "homepage": "https://github.com/shigechika/mcp-stdio",
                  "license": "MIT",
                  "test_cmd": "mcp-stdio",
                  "extra_deps": [],
                  "uses_from_macos": [],
              },
              "speedtest-z": {
                  "formula": "speedtest-z",
                  "desc": "Automated speed test across 8 major sites with Zabbix integration",
                  "homepage": "https://github.com/shigechika/speedtest-z",
                  "license": "Apache-2.0",
                  "test_cmd": "speedtest-z",
                  "extra_deps": [
                      'depends_on "rust" => :build',
                      'depends_on "libffi"',
                      'depends_on "openssl@3"',
                  ],
                  "uses_from_macos": [],
              },
          }

          meta = PACKAGE_META[pkg]

          with open("/tmp/formula-raw.rb") as f:
              content = f.read()

          # desc
          content = re.sub(r'desc ".*?"', f'desc "{meta["desc"]}"', content)

          # homepage
          content = re.sub(r'homepage ".*?"', f'homepage "{meta["homepage"]}"', content)

          # license (after first sha256 line only)
          if "license" not in content:
              content = re.sub(
                  r'(  sha256 ".*?")\n\n  depends_on',
                  rf'\1\n  license "{meta["license"]}"\n\n  depends_on',
                  content,
                  count=1,
              )

          # depends_on: replace python3 with full dependency block
          # build deps first, then regular deps, then uses_from_macos
          dep_lines = meta["extra_deps"] + [
              'depends_on "python@3.13"',
          ]
          uses_lines = meta.get("uses_from_macos", [])
          if uses_lines:
              dep_lines.append("")
              dep_lines.extend(uses_lines)
          dep_block = "\n  ".join(dep_lines)
          content = content.replace('depends_on "python3"', dep_block)

          # test block
          test_cmd = meta["test_cmd"]
          content = re.sub(
              r"  test do\n.*?\n  end",
              f'  test do\n    assert_match "{test_cmd}", shell_output("#{{bin}}/{test_cmd} --version")\n  end',
              content,
              flags=re.DOTALL,
          )

          with open(f'Formula/{meta["formula"]}.rb', "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "update: ${{ steps.pkg.outputs.name }} formula"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger bottle build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run bottle.yml -f formula="${{ steps.pkg.outputs.name }}"
