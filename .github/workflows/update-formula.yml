name: Update Formula

on:
  repository_dispatch:
    types: [update_junos_ops, update_speedtest_z, update_mcp_stdio]
  workflow_dispatch:
    inputs:
      package:
        description: "Package to update"
        required: true
        type: choice
        options:
          - junos-ops
          - mcp-stdio
          - speedtest-z

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # checkout v5+ defaults persist-credentials to false; the Push
          # step below relies on the GITHUB_TOKEN being persisted so the
          # bot can push the regenerated formula back to main. Restore the
          # v4 behavior explicitly.
          persist-credentials: true

      # The bot pushes here with the default GITHUB_TOKEN, and GitHub's
      # recursion guard means such pushes do NOT trigger lint.yml's `push`
      # event. So lint never runs on the generated formula. Set Homebrew up
      # so we can run `brew audit`/`brew style` inline before pushing instead.
      - uses: Homebrew/actions/setup-homebrew@main

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Determine package
        id: pkg
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              update_junos_ops)   echo "name=junos-ops" >> "$GITHUB_OUTPUT" ;;
              update_mcp_stdio)  echo "name=mcp-stdio" >> "$GITHUB_OUTPUT" ;;
              update_speedtest_z) echo "name=speedtest-z" >> "$GITHUB_OUTPUT" ;;
            esac
            # client_payload.version から v prefix を除去（例: v0.5.1 → 0.5.1）
            RAW_VERSION="${{ github.event.client_payload.version }}"
            echo "version=${RAW_VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        # PyPI's JSON index reflects a new release immediately, but the
        # files.pythonhosted.org CDN that ``pip install`` downloads from
        # can lag by up to several minutes after publish. When this job
        # is kicked off by the upstream release workflow's
        # repository_dispatch (fired within seconds of the PyPI upload),
        # we routinely hit that window and ``pip install PKG==VERSION``
        # fails with "No matching distribution found". Retry with a
        # short backoff to absorb the propagation delay.
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          if [ -n "$VERSION" ]; then
            SPEC="${PKG}==${VERSION}"
          else
            SPEC="${PKG}"
          fi

          max_attempts=10
          delay=30
          attempt=1
          while true; do
            if pip install "setuptools<71" "$SPEC" homebrew-pypi-poet; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::pip install $SPEC failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::pip install $SPEC failed on attempt $attempt/$max_attempts — retrying in ${delay}s (PyPI CDN propagation)"
            attempt=$((attempt + 1))
            sleep "$delay"
          done

      - name: Generate formula
        # ``poet -f`` queries the PyPI JSON API to fetch the sdist URL.
        # That API can lag behind ``pip install`` by up to a few
        # minutes after a release — even though the ``Install tools``
        # step above already succeeded, poet can still see the
        # previous version and generate a formula pointing at the
        # old tarball. Retry until the generated URL contains the
        # expected version (or until we have no expected version,
        # in which case the first successful run wins).
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          max_attempts=10
          delay=30
          attempt=1
          while true; do
            poet -f "$PKG" > /tmp/formula-raw.rb
            if [ -z "$VERSION" ]; then
              break  # no explicit version requested; accept whatever poet gave us
            fi
            if grep -q "${PKG//-/_}-${VERSION}\.tar\.gz" /tmp/formula-raw.rb; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::poet kept generating formula for a version other than $VERSION after $max_attempts attempts"
              echo "--- generated formula url line ---"
              grep '^  url ' /tmp/formula-raw.rb || true
              exit 1
            fi
            echo "::warning::poet generated formula does not yet reference ${PKG} ${VERSION} on attempt $attempt/$max_attempts — retrying in ${delay}s (PyPI JSON API propagation)"
            attempt=$((attempt + 1))
            sleep "$delay"
          done

      - name: Patch formula metadata
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
        run: |
          python3 << 'PYEOF'
          import os, re

          pkg = os.environ["PACKAGE_NAME"]

          PACKAGE_META = {
              "junos-ops": {
                  "formula": "junos-ops",
                  "desc": "Automated JUNOS package update tool for Juniper devices",
                  "homepage": "https://github.com/shigechika/junos-ops",
                  "license": "Apache-2.0",
                  "test_cmd": "junos-ops",
                  "extra_deps": [
                      'depends_on "pkgconf" => :build',
                      'depends_on "rust" => :build',
                      'depends_on "libffi"',
                      'depends_on "libsodium"',
                      'depends_on "openssl@3"',
                  ],
                  "uses_from_macos": [
                      'uses_from_macos "libxml2"',
                      'uses_from_macos "libxslt"',
                  ],
              },
              "mcp-stdio": {
                  "formula": "mcp-stdio",
                  "desc": "Stdio-to-HTTP relay for MCP servers",
                  "homepage": "https://github.com/shigechika/mcp-stdio",
                  "license": "MIT",
                  "test_cmd": "mcp-stdio",
                  "extra_deps": [],
                  "uses_from_macos": [],
              },
              "speedtest-z": {
                  "formula": "speedtest-z",
                  "desc": "Automated speed test across 8 major sites with Zabbix integration",
                  "homepage": "https://github.com/shigechika/speedtest-z",
                  "license": "Apache-2.0",
                  "test_cmd": "speedtest-z",
                  "extra_deps": [
                      'depends_on "rust" => :build',
                      'depends_on "libffi"',
                      'depends_on "openssl@3"',
                  ],
                  "uses_from_macos": [],
              },
          }

          meta = PACKAGE_META[pkg]

          with open("/tmp/formula-raw.rb") as f:
              content = f.read()

          # desc
          content = re.sub(r'desc ".*?"', f'desc "{meta["desc"]}"', content)

          # homepage
          content = re.sub(r'homepage ".*?"', f'homepage "{meta["homepage"]}"', content)

          # license (after first sha256 line only)
          if "license" not in content:
              content = re.sub(
                  r'(  sha256 ".*?")\n\n  depends_on',
                  rf'\1\n  license "{meta["license"]}"\n\n  depends_on',
                  content,
                  count=1,
              )

          # depends_on: replace python3 with full dependency block
          # build deps first, then regular deps, then uses_from_macos.
          # Each non-empty element gets the standard two-space indent;
          # the blank separator line must be truly empty (not two
          # spaces) so rubocop's Layout/TrailingWhitespace stays quiet.
          dep_lines = meta["extra_deps"] + [
              'depends_on "python@3.13"',
          ]
          uses_lines = meta.get("uses_from_macos", [])
          if uses_lines:
              # Emit "<deps>\n\n  <uses_from_macos...>" — the blank
              # line has zero trailing whitespace.
              dep_block = (
                  "\n  ".join(dep_lines)
                  + "\n\n  "
                  + "\n  ".join(uses_lines)
              )
          else:
              dep_block = "\n  ".join(dep_lines)
          content = content.replace('depends_on "python3"', dep_block)

          # test block
          test_cmd = meta["test_cmd"]
          content = re.sub(
              r"  test do\n.*?\n  end",
              f'  test do\n    assert_match "{test_cmd}", shell_output("#{{bin}}/{test_cmd} --version")\n  end',
              content,
              flags=re.DOTALL,
          )

          # Belt-and-braces cleanup: strip any trailing whitespace that
          # survived the edits above, so rubocop's Layout/TrailingWhitespace
          # check is always satisfied regardless of future template tweaks.
          content = "\n".join(line.rstrip() for line in content.splitlines()) + "\n"

          with open(f'Formula/{meta["formula"]}.rb', "w") as f:
              f.write(content)
          PYEOF

      - name: Commit formula
        id: commit
        env:
          PKG: ${{ steps.pkg.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "update: ${PKG} formula"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Gate the push on brew audit/style. lint.yml does not run on this
      # bot push (GITHUB_TOKEN recursion guard), so without this gate a
      # malformed generated formula would land on main and only fail later
      # at the bottle build. Running the checks after the local commit but
      # before the push means a failure aborts the job with nothing pushed.
      - name: Audit and style-check formula
        if: steps.commit.outputs.changed == 'true'
        env:
          PKG: ${{ steps.pkg.outputs.name }}
        run: |
          brew style "shigechika/tap/${PKG}"
          brew audit --strict "shigechika/tap/${PKG}"

      # Push with rebase-retry. Other concurrent jobs (another package's
      # update, a bottle publish, or the readme sync) push to the same
      # main, so a plain push can be rejected as non-fast-forward. Each
      # job touches different files (this one: a single Formula/*.rb), so
      # rebasing onto the latest main applies cleanly.
      #
      # Push the target ref explicitly (origin HEAD:main): actions/checkout
      # leaves the local main without an upstream tracking ref, so a bare
      # `git push` fails with "current branch main has no upstream branch".
      #
      # Embed the token in the remote URL instead of relying on checkout's
      # persisted credentials: checkout v5+ stores auth via an
      # includeIf.gitdir directive bound to the literal workspace path, but
      # setup-homebrew symlinks this repo into Homebrew's Taps dir, so git
      # operations resolve a path the includeIf never matches and the auth
      # is invisible ("could not read Username"). A token in origin's URL is
      # path-independent and survives the symlink.
      - name: Push
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          n=0
          until git push origin HEAD:main; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "::error::push failed after $n attempts"
              exit 1
            fi
            echo "::warning::push rejected (attempt $n) — rebasing onto origin/main"
            git pull --rebase origin main
            sleep $((n * 3))
          done

      - name: Trigger bottle build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run bottle.yml -f formula="${{ steps.pkg.outputs.name }}"

      # File (or update) an issue when the job fails. repository_dispatch
      # runs are kicked off by upstream releases and nobody watches them,
      # so a silent failure can go unnoticed for several releases (which is
      # exactly how the formulae fell behind in June 2026). Surfacing it as
      # an issue puts it on the maintainer's notification feed. One open
      # issue per package: if it already exists we comment instead of
      # spamming a new one.
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ steps.pkg.outputs.name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT: ${{ github.event_name }}
        run: |
          pkg="${PKG:-unknown}"
          title="Formula auto-update failing: ${pkg}"
          existing="$(gh issue list --repo "$REPO" --state open --limit 100 \
            --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -1)"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" \
              --body "Still failing (trigger: \`${EVENT}\`) — ${RUN_URL}"
          else
            # The backticks below are literal Markdown for the issue body,
            # not command substitution. shellcheck SC2016 flags them anyway.
            # shellcheck disable=SC2016
            body="$(printf 'The `Update Formula` workflow failed for **%s** (trigger: `%s`).\n\nRun: %s\n\nThe formula was not updated. Check the run log, fix the cause, then re-run:\n\n```\ngh workflow run update-formula.yml -f package=%s\n```\n\nFiled automatically; reused (commented) on repeat failures, close once a run succeeds.' \
              "$pkg" "$EVENT" "$RUN_URL" "$pkg")"
            gh issue create --repo "$REPO" --title "$title" --body "$body"
          fi
